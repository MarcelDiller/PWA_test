<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Dennert ICON CHeckliste</title>
  <link rel="stylesheet" href="css/CSS-test.css" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2c3e50" />

  <!-- iOS Support -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ICON" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <script src="sharepoint.js"></script>
</head>
<body>
 <div class="page">
  <div class="toolbar">

  </div>

  <div id="app"></div>
</div>
<!-- PDF Modal -->
<div id="pdf-modal" class="modal-overlay">
  <div class="modal-window">
    <div class="modal-header">
      <span id="pdf-modal-title" class="modal-title"></span>
      <button onclick="closePdfModal()" class="modal-close">✕</button>
    </div>
    <iframe id="pdf-modal-frame" src="" class="modal-frame"></iframe>
  </div>
</div>
<div id="upload-section">
  <button id="btn-upload" onclick="handleUpload()">Alles hochladen</button>
</div>
<script>
const formSpec = {
  title: "Abnahmeprotokoll ICON Modul",

  headerFields: [
    { key: "project", label: "Bauvorhaben", value: "", width: "60%" },
    { key: "monteur", label: "Monteur", value: "", width: "25%" },
    { key: "controller", label: "Kontrolleur", value: "", width: "35%" },
    { key: "inside", label: "Farbe Innen", value: "", width: "45%" },
    { key: "outside", label: "Farbe außen.", value: "", width: "45%" },
  ],

  sections: [
    {
      type: "questions",
      title: "Fenster/Außentür", // optional
      pdf: "docs/2026-01-15_ Abnahme Fenster.pdf",
      items: [
        { id: "q01", nr: "01.", text: "Handelt es sich um ein QNG zertifiziertes Haus?", kind: "yesno", answer: null, note: "QNG", id: "QNG"},
        { id: "q02", nr: "02.", text: "Fensterrahmen sind nach Prüfvorgaben ohne Mangel?", kind: "Mangel", answer: null, note: "" },
        { id: "q03", nr: "03.", text: "Fensterflügel sind nach Prüfvorgaben ohne Mangel?", kind: "Mangel", answer: null, note: "" },
        { id: "q04", nr: "04.", text: "Dichtungen sind nach Prüfvorgaben ohne Mangel?", kind: "Mangel", answer: null, note: "" },
        { id: "q05", nr: "05.", text: "Scheiben sind nach Prüfvorgaben ohne Mangel ?", kind: "Mangel", answer: null, note: "" },
        { id: "q06", nr: "06.", text: "Fenstergriffe sind nach Prüfvorgaben ohne Mangel ?", kind: "Mangel", answer: null, note: "" },
        { id: "q07", nr: "07.", text: "Rollos/Rolloschienen sind nach Prüfvorgaben ohne Mangel ?", kind: "Mangel", answer: null, note: "" },
        { id: "q08", nr: "08.", text: "Hauseingangstüre sind nach Prüfvorgaben ohne Mangel ?", kind: "Mangel", answer: null, note: "" },
        { id: "q09", nr: "09.", text: "Nebeneingangstüre sind nach Prüfvorgaben ohne Mangel ?", kind: "Mangel", answer: null, note: "" },
        { id: "q10", nr: "10.", text: "Raffstores sind nach Prüfvorgaben ohne Mangel ?", kind: "Mangel", answer: null, note: "" },
        { id: "q11", nr: "11.", text: "Insektenschutz sind nach Prüfvorgaben ohne Mangel ?", kind: "Mangel", answer: null, note: "" },
      ]
    },
    {
      type: "notes",
      title: "Bemerkung:",
      paragraphs: [
        "test",
      ],
    },
    {
      type: "QNG",
      title: "QNG Haus:",
      id:"QNG",
      paragraphs: [
        "Wir bestätigen ausschließlich die von der Firma DENNERT zur Verfügung gestellten Materialien verwendet zu haben und somit bei der Ausführung unserer Bauleistung die Anforderungen des QNG-Anforderungskatalogs (Anhangdokument 313 in der geltenden Fassung) erfüllt zu haben.",
      ],
    },
  ],
};

// Codes nur bei Mangel
      // ──────────────────────────────────────────────────────────────────
      const CODE_OPTIONS = {
        bereich: [
          "1 - Keller",
        ],
        raum: [
          "1 - Außen allgemein",
        ],
        objekt: [
          "1 - Außenputz",
        ],
        mangel: [
          "1 - Beschädigt",
        ],
      };
      // ─────────────────────────────────────────────────────────────────
  // Mini-Helper
  // Erspart deuerndes neu erstellen der div elemente
  //so muss der code nur 1 mal vorhanden sein
  const el = (tag, attrs = {}, children = []) => {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") node.className = v;
      else if (k === "text") node.textContent = v;
      else node.setAttribute(k, v);
    }
    children.forEach((c) => node.appendChild(c));
    return node;
  };
  const toolbar = document.querySelector(".toolbar");
  const app = document.querySelector("#app");

  async function handleUpload() {
  const btn = document.getElementById("btn-upload");

  const inputs = document.querySelectorAll(".mangel-file");
  const uploads = [];

  inputs.forEach(input => {
    if (!input.files || input.files.length === 0) return;
    uploads.push({
      file: input.files[0],
      sectionTitle: input.dataset.sectionTitle || "Unbekannt",
      itemNr: input.dataset.itemNr || "00"
    });
  });

  if (uploads.length === 0) {
    console.log("Keine Bilder ausgewählt.");
    return;
  }

  btn.disabled = true;
  btn.textContent = "⏳ Wird hochgeladen…";

  let ok = 0, fail = 0;
  for (const { file, sectionTitle, itemNr } of uploads) {
    const filename = buildFilename(sectionTitle, itemNr, file);
    console.log(`↑ ${filename} …`);

    try {
      await uploadImageToSharePoint(file, filename);
      console.log(`✅ ${filename}`);
      ok++;
    } catch (err) {
      console.error(`❌ ${filename}: ${err.message}`);
      fail++;
    }
  }

  console.log(`${ok} erfolgreich, ${fail} fehlgeschlagen.`);
  btn.disabled = false;
  btn.textContent = "Alle Bilder hochladen";
}

  function buildFilename(sectionTitle, itemNr, originalFile) {
    const safeTitle = sectionTitle.replace(/[/\\?%*:|"<> ]/g, "-"); // Sonderzeichen entfernen
    const safeNr    = itemNr.replace(".", "").trim().padStart(2, "0");
    const date      = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    const ext       = originalFile.name.split(".").pop();
    return `${safeTitle}_${safeNr}_${date}.${ext}`;
    // Ergebnis z.B.: Fenster-Außentür_02_2026-04-27.jpg
  }

  function renderTitle(spec) {
    return el("div", {}, [
      el("h1", { class: "title", text: spec.title }),
      el("div", { class: "subtitle", text: spec.subtitle }),
    ]);
  }

  function renderHeader(spec) {
    const grid = el("div", { class: "header-grid" });

    spec.headerFields.forEach((f) => {
      const wrap = el("div", { class: "hfield" });
      wrap.appendChild(el("div", { class: "label", text: f.label + ":" }));
      const box = el("input", { class: "box" });
      box.style.width = f.width || "100%";
      box.value = f.value ?? "";
      wrap.appendChild(box);
      grid.appendChild(wrap);
    });

    return el("div", {}, [
      renderTitle(spec),
      grid,
      el("div", { class: "hr" }),
    ]);
  }
  
  function renderSection(section)
  {
    if (section.type === "notes") return renderNotesSection(section);
    if (section.type === "questions") return renderQuestionsSection(section);
    if (section.type === "QNG") return;
    return el("div", { class: "section" }, [
      el("div", { text: `Unbekannter Section-Typ: ${section.type}` })
    ]);
  }

  function renderZertifikatSection(section)
  {
    const wrap = el("div", { class: "notes", id: section.id });
  
  if (section.title) {
    wrap.appendChild(el("h3", { text: section.title }));
  }
  (section.paragraphs || []).forEach(p => {
    wrap.appendChild(el("p", { text: p }));
  });

  return wrap; 
  }

   //entfernt Zertifikat sections
  function removeZertifikatSection(section) {
    const existing = document.getElementById(section.id);
    if (existing) existing.remove();
  }
  //zeigt Notes aus JSon an
  function renderNotesSection(section) {
    const wrap = el("div", { class: "notes" });
  
  if (section.title) {
    wrap.appendChild(el("h3", { text: section.title }));
  }
  (section.paragraphs || []).forEach(p => {
    wrap.appendChild(el("p", { text: p }));
  });

  return wrap; 
  }

  function renderQuestionsSection(section) {
    const wrap = el("div", { class: "section section-questions" });
    if (section.title) {
      const titleEl = el("h2", { class: "section-title", text: section.title });
      if (section.pdf) {
        titleEl.classList.add("section-title-clickable");
        titleEl.addEventListener("click", () => openPdfModal(section.title, section.pdf));
      }
      wrap.appendChild(titleEl);
    }

    const list = el("div", { class: "q-list" });
    (section.items || []).forEach((item) => list.appendChild(renderQuestionsRow(item, section.title)));
    list.appendChild(el("div", { class: "hr" }));
    wrap.appendChild(list);

    return wrap;
  }

  function renderQuestionsRow(item, sectionTitle){
    const row = el("div", { class: "q-row" });

    // links: Nummer + Text
    const left = el("div", { class: "q-left" }, [
      el("div", { class: "q-nr", text: item.nr || "" }),
      el("div", { class: "q-text", text: item.text || "" }),
    ]);

    // rechts: controls
    const right = el("div", { class: "q-right" });

    const isYesNo = item.kind === "yesno";
    const isMangel = item.kind === "Mangel";

    // Radios nur für yesno & mangel
    if (isYesNo || isMangel) {
      // Bei Mangel: Y/N links, Codes rechts daneben
      const rowWrap = el("div", { class: isMangel ? "mangel-row" : "" });

      const yn = el("div", { class: "yn" });

      const yesInput = el("input", { type: "radio", name: item.id, value: "yes" });
      const noInput  = el("input", { type: "radio", name: item.id, value: "no" });
      const notApplicable  = el("input", { type: "radio", name: item.id, value: "N/A" });

      const yes = el("label", { class: "yn-btn" }, [
        yesInput,
        el("span", { text: "Ja" }),
      ]);
      if (item.note === "QNG") {
        const qngSection = formSpec.sections.find(s => s.type === "QNG");
        
        yesInput.addEventListener("change", () => {
          // Erst entfernen falls vorhanden, dann neu anhängen
          removeZertifikatSection(qngSection);
          const rendered = renderNotesSection(qngSection); 
          rendered.id = qngSection.id; // ID setzen damit remove funktioniert
          app.appendChild(rendered);
        });
        
        noInput.addEventListener("change", () => {
          removeZertifikatSection(qngSection);
        });
      }
      const no = el("label", { class: "yn-btn" }, [
        noInput,
        el("span", { text: "Nein" }),
      ]);
      const NA = el("label", { class: "yn-btn" }, [
        notApplicable,
        el("span", { text: "N/A" }),
      ]);

      // initial
      if (item.answer === true || item.answer === "yes") yesInput.checked = true;
      if (item.answer === false || item.answer === "no") noInput.checked = true;

      yn.appendChild(yes);
      yn.appendChild(no);
      yn.appendChild(NA);

      rowWrap.appendChild(yn);
      if (isMangel) {
        item.codesList = []; // Reset beim neu Rendern
        const codesContainer = el("div", { class: "codes-container" });

        // Erste leere Zeile sofort einfügen
        CheckAndAddMangel(item, codesContainer, sectionTitle);

        const setCodesVisible = () => {
          const show = noInput.checked;
          codesContainer.style.display = show ? "block" : "none";
        };

        yesInput.addEventListener("change", () => { item.answer = true;  setCodesVisible(); });
        notApplicable.addEventListener("change", () => { item.answer = true;  setCodesVisible(); });
        noInput.addEventListener ("change", () => { item.answer = false; setCodesVisible(); });
        setCodesVisible();

        row.__mangelCodes = codesContainer; 
      } else {
        yesInput.addEventListener("change", () => (item.answer = true));
        noInput.addEventListener ("change", () => (item.answer = false));
      }

      right.appendChild(rowWrap);
    }

    // Fallback: andere kinds bekommen KEINE Radios
    if (!isYesNo && !isMangel) {
      const input = el("input", {
        class: "q-fallback",
        type: "text",
        placeholder: "Antwort...",
      });
      input.value = item.answer ?? "";
      input.addEventListener("input", () => (item.answer = input.value));
      right.appendChild(input);
    }

    const top = el("div", { class: "q-row-top" });
    top.appendChild(left);
    top.appendChild(right);
    row.appendChild(top);
    // Mangel-Codes unter der ganzen Zeile einfügen
    if (item.kind === "Mangel") {
      row.appendChild(row.__mangelCodes);
      delete row.__mangelCodes;
    }
    return row;
  }
  function CheckAndAddMangel(item, codesContainer, sectionTitle) {
    // Erstellt eine neue Zeile mit 4 Dropdowns
    const rowEl = el("div", { class: "codes" });
    const entryIndex = (item.codesList ??= []).length;
    item.codesList.push({ bereich: "", raum: "", objekt: "", mangel: "" });

    let filledCount = 0; // Zählt wie viele Dropdowns ausgefüllt wurden

    ["bereich", "raum", "objekt", "mangel"].forEach((key) => {
      const labels = { bereich: "Bereich", raum: "Raum", objekt: "Objekt", mangel: "Mangel" };
      const wrap = el("div", { class: "code-col" });
      wrap.appendChild(el("div", { class: "code-label", text: labels[key] }));

      const container = el("div", { class: "code-dropdown-wrap" });
      const button = el("div");
      const optionsContainer = el("div");

      customdropdown(
        "Wählen",
        CODE_OPTIONS[key],
        optionsContainer,
        button,
        container
      );

      // Beim Auswählen: Wert speichern + ggf. neue Zeile anfügen
      optionsContainer.addEventListener("click", (e) => {
        if (e.target.classList.contains("custom-option")) {
          const wasEmpty = item.codesList[entryIndex][key] === "";
          item.codesList[entryIndex][key] = e.target.textContent;

          if (wasEmpty) {
            filledCount++;
            // Erst beim ERSTEN ausgefüllten Dropdown dieser Zeile → neue Zeile anhängen
            if (filledCount === 1) {
              CheckAndAddMangel(item, codesContainer, sectionTitle);
            }
          }
        }
      });
      wrap.appendChild(container);
      rowEl.appendChild(wrap);
    });
    const input = el("input", {class: "mangel-note"});
    input.placeholder = "Notiz";
    const file_input = el("input", { class: "mangel-file", type: "file", accept: "image/*" });
    file_input.dataset.sectionTitle = sectionTitle || "Unbekannt";
    file_input.dataset.itemNr       = item.nr      || "00";
    const divider = el("div", { class: "mangel-divider" });
    rowEl.appendChild(input);
    rowEl.appendChild(file_input);
    codesContainer.appendChild(rowEl);
    codesContainer.appendChild(divider);
  }

  // Haupt-Render: view = header | notes | questions | all
  function render(spec, view = "all") {
    app.innerHTML = "";

    const header = renderHeader(spec);
    // all
    app.appendChild(header);
    let sectionsToRender = spec.sections;

    if (view !== "all") {
      // 1) Wenn view ein type ist (questions/notes)
      const byType = spec.sections.filter((s) => s.type === view);
      if (byType.length) sectionsToRender = byType;

      // 2) Oder wenn view eine konkrete section-id ist
      const byId = spec.sections.filter((s) => s.id === view);
      if (byId.length) sectionsToRender = byId;
    }

    sectionsToRender.forEach((section) => app.appendChild(renderSection(section)));
  }
  
//navigation buttons
formSpec.sections.forEach(section => {
  if(section.type !== "QNG"){
    const btn = el("button", {
      class: "nav-btn",
      text: section.title || section.type
    });

    btn.dataset.view = section.type;

    btn.addEventListener("click", () => {
      render(formSpec, btn.dataset.view);
    });

    toolbar.appendChild(btn);
  }
});
//pdf pop up für vorgang etc
function openPdfModal(title, pdfPath) {
  document.getElementById("pdf-modal-title").textContent = title;
  document.getElementById("pdf-modal-frame").src = pdfPath;
  const modal = document.getElementById("pdf-modal");
  modal.style.display = "flex";
}

function closePdfModal() {
  document.getElementById("pdf-modal").style.display = "none";
  document.getElementById("pdf-modal-frame").src = "";
}

document.getElementById("pdf-modal").addEventListener("click", function(e) {
  if (e.target === this) closePdfModal();
});

//dropdown menü direkt geholt aus Custom_Dropdown projekt
function customdropdown(standartwert, Auswahl,optionsContainer,button,container){
            button.classList.add("custom-select");
            button.textContent = standartwert; // Standardwert
            container.appendChild(button);

            optionsContainer.classList.add("custom-options");
            container.appendChild(optionsContainer);
            //erstellt elemente der Classe custom-option welche in optionsContainer angefügt werden
            Auswahl.forEach(
                function dropdowninhalt(inhalt){
                let option = document.createElement("div");
                option.classList.add("custom-option");
                option.textContent = `${inhalt}`;
                option.addEventListener("click", () => {
                        button.textContent = option.textContent;
                        optionsContainer.style.display = "none";
                    });
                    optionsContainer.appendChild(option);
                }
            )
            // Dropdown ein-/ausblenden
            button.addEventListener("click", () => {
                optionsContainer.style.display = optionsContainer.style.display === "block" ? "none" : "block";
            });

            // Dropdown schließen, wenn außerhalb geklickt wird
            document.addEventListener("click", (e) => {
                if (!button.contains(e.target)) {
                    optionsContainer.style.display = "none";
                }
            });
        }

  // initial
  render(formSpec, "all");
</script>

      navigator.serviceWorker

    });

</script>
